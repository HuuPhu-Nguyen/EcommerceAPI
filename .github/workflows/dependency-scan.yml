name: Dependency Scan

on:
  schedule:
    - cron: '17 6 * * 1'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  owasp-dependency-check:
    name: OWASP Dependency-Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Java
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Cache OWASP Dependency-Check data
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.dependency-check
          key: dependency-check-${{ runner.os }}-${{ hashFiles('pom.xml') }}
          restore-keys: |
            dependency-check-${{ runner.os }}-

      - name: Run dependency scan
        id: dependency_check
        continue-on-error: true
        env:
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}
        run: |
          if [ -z "${NVD_API_KEY:-}" ]; then
            mkdir -p target/dependency-check-report
            printf '%s\n' \
              'NVD_API_KEY is required for reproducible OWASP Dependency-Check runs.' \
              'Configure the repository secret NVD_API_KEY, then re-run this workflow.' \
              > target/dependency-check-report/NVD_API_KEY_REQUIRED.txt
            echo "::error::NVD_API_KEY repository secret is required for reproducible OWASP Dependency-Check runs."
            exit 1
          fi
          ./mvnw -B -ntp -Pdependency-scan -DskipTests "-Djacoco.skip=true" "-DnvdApiKey=${NVD_API_KEY}" verify

      - name: Upload dependency-check report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: dependency-check-report
          path: target/dependency-check-report
          if-no-files-found: ignore

      - name: Fail on dependency scan findings or scan failure
        if: steps.dependency_check.outcome == 'failure'
        run: exit 1
