name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  schedule:
    - cron: '0 9 * * 1'
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  pull-requests: read

jobs:
  verify:
    name: Maven Verify
    runs-on: ubuntu-latest
    if: github.event_name != 'schedule'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Docker preflight for Testcontainers
        run: |
          docker version || { echo "::error::Docker is required for Testcontainers-backed tests."; exit 1; }
          docker info || { echo "::error::Docker daemon is not available for Testcontainers-backed tests."; exit 1; }

      - name: Verify
        run: ./mvnw -B -ntp verify

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: target/surefire-reports
          if-no-files-found: ignore

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: target/site/jacoco
          if-no-files-found: ignore

  dependency-scan:
    name: OWASP Dependency Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Cache OWASP Dependency-Check data
        uses: actions/cache@v4
        with:
          path: ~/.dependency-check
          key: dependency-check-${{ runner.os }}-${{ hashFiles('pom.xml') }}
          restore-keys: |
            dependency-check-${{ runner.os }}-

      - name: Run OWASP Dependency-Check
        id: dependency_check
        continue-on-error: true
        env:
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}
        run: |
          if [ -z "${NVD_API_KEY:-}" ]; then
            mkdir -p target/dependency-check-report
            printf '%s\n' \
              'NVD_API_KEY is required for reproducible OWASP Dependency-Check runs.' \
              'Configure the repository secret NVD_API_KEY, then re-run this workflow.' \
              > target/dependency-check-report/NVD_API_KEY_REQUIRED.txt
            echo "::error::NVD_API_KEY repository secret is required for reproducible OWASP Dependency-Check runs."
            exit 1
          fi
          ./mvnw -B -ntp -Pdependency-scan -DskipTests "-DnvdApiKey=${NVD_API_KEY}" verify

      - name: Upload Dependency-Check reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dependency-check-reports
          path: target/dependency-check-report
          if-no-files-found: ignore

      - name: Fail on Dependency-Check findings or scan failure
        if: steps.dependency_check.outcome == 'failure'
        run: exit 1

  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Review dependency changes
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high

  secret-scan:
    name: Gitleaks Secret Scan
    runs-on: ubuntu-latest
    if: github.event_name != 'schedule'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2

  container-scan:
    name: Docker Build And Trivy Scan
    runs-on: ubuntu-latest
    if: github.event_name != 'schedule'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build image
        run: docker build -t ecommerce-api:${{ github.sha }} .

      - name: Scan image
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ecommerce-api:${{ github.sha }}
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          exit-code: '1'
          limit-severities-for-sarif: true

      - name: Upload Trivy results
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-results.sarif
