services:
  postgres:
    image: postgres:16-alpine
    container_name: ecommerce-api-postgres
    environment:
      POSTGRES_DB: ecommerce
      POSTGRES_USER: ecommerce_app
      POSTGRES_PASSWORD: ecommerce_app_password
    ports:
      - "${POSTGRES_HOST_PORT:-5433}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ecommerce_app -d ecommerce"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  postgres-data:
