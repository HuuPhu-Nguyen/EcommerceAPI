spring.datasource.url=${ECOMMERCE_DB_URL:jdbc:postgresql://localhost:5433/ecommerce}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=${ECOMMERCE_DB_USERNAME:ecommerce_app}
spring.datasource.password=${ECOMMERCE_DB_PASSWORD:ecommerce_app_password}

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true

app.environment=local
app.payment-provider=${PAYMENT_PROVIDER:fake}
app.authentication-provider=${AUTHENTICATION_PROVIDER:keycloak}
app.stripe.secret-key=${STRIPE_SECRET_KEY:}

spring.security.oauth2.resourceserver.jwt.jwk-set-uri=${OAUTH2_JWK_SET_URI:http://localhost:8081/realms/ecommerce/protocol/openid-connect/certs}
