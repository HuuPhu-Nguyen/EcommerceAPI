spring.datasource.url=${ECOMMERCE_DB_URL:jdbc:postgresql://localhost:5432/demo3}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=${ECOMMERCE_DB_USERNAME:postgres}
spring.datasource.password=${ECOMMERCE_DB_PASSWORD:postgres}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

app.environment=local
app.payment-provider=${PAYMENT_PROVIDER:fake}
app.authentication-provider=${AUTHENTICATION_PROVIDER:legacy}
app.stripe.secret-key=${STRIPE_SECRET_KEY:}
