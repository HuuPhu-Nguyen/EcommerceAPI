spring.datasource.url=${ECOMMERCE_DB_URL}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=${ECOMMERCE_DB_USERNAME}
spring.datasource.password=${ECOMMERCE_DB_PASSWORD}

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
springdoc.api-docs.enabled=${SPRINGDOC_API_DOCS_ENABLED:false}
springdoc.swagger-ui.enabled=${SPRINGDOC_SWAGGER_UI_ENABLED:false}

app.environment=prod
app.openapi.public-docs-enabled=${OPENAPI_PUBLIC_DOCS_ENABLED:false}
app.payment-provider.active=${PAYMENT_PROVIDER_ACTIVE:}
app.payment-provider.enabled=${PAYMENT_PROVIDER_ENABLED:}
app.authentication-provider=${AUTHENTICATION_PROVIDER:keycloak}
app.fake-provider.webhook-secret=${FAKE_PROVIDER_WEBHOOK_SECRET:}
app.stripe.secret-key=${STRIPE_SECRET_KEY:}
app.stripe.webhook-secret=${STRIPE_WEBHOOK_SECRET:}
app.stripe.api-version=${STRIPE_API_VERSION:}
app.stripe.connect-timeout-ms=${STRIPE_CONNECT_TIMEOUT_MS:2000}
app.stripe.read-timeout-ms=${STRIPE_READ_TIMEOUT_MS:5000}
app.security.oauth2.required-audience=${OAUTH2_REQUIRED_AUDIENCE}
app.security.oauth2.resource-client-id=${OAUTH2_RESOURCE_CLIENT_ID}
app.security.oauth2.allowed-authorized-parties=${OAUTH2_ALLOWED_AUTHORIZED_PARTIES:}
app.security.forwarded-headers.trusted-proxies=${TRUSTED_PROXY_CIDRS:}

spring.security.oauth2.resourceserver.jwt.issuer-uri=${OAUTH2_ISSUER_URI}
