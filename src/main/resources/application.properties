spring.application.name=E-Commerce API
spring.jpa.open-in-view=false
spring.flyway.enabled=true
spring.mvc.problemdetails.enabled=true
server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=${SHUTDOWN_TIMEOUT:30s}
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.probes.enabled=true
management.endpoint.health.group.liveness.include=livenessState
management.endpoint.health.group.readiness.include=readinessState,db,paymentProviders
management.endpoint.health.show-details=when_authorized
springdoc.swagger-ui.operations-sorter=method
springdoc.swagger-ui.tags-sorter=alpha
app.openapi.public-docs-enabled=${OPENAPI_PUBLIC_DOCS_ENABLED:true}
logging.structured.format.console=${LOG_STRUCTURED_FORMAT:logstash}
logging.structured.json.context.include=true
logging.structured.ecs.service.environment=${APP_ENVIRONMENT:local}
app.outbox.processing-enabled=${OUTBOX_PROCESSING_ENABLED:true}
app.outbox.processing-fixed-delay-ms=${OUTBOX_PROCESSING_FIXED_DELAY_MS:2000}
app.outbox.batch-size=${OUTBOX_BATCH_SIZE:50}
app.audit.signature-secret=${AUDIT_SIGNATURE_SECRET:}
app.audit.hash-verification.batch-size=${AUDIT_HASH_VERIFICATION_BATCH_SIZE:500}
app.reconciliation.scheduling-enabled=${RECONCILIATION_SCHEDULING_ENABLED:true}
app.reconciliation.fixed-delay-ms=${RECONCILIATION_FIXED_DELAY_MS:300000}
app.reconciliation.batch-size=${RECONCILIATION_BATCH_SIZE:500}
app.reconciliation.max-issues-per-run=${RECONCILIATION_MAX_ISSUES_PER_RUN:1000}
app.security.rate-limit.enabled=${RATE_LIMIT_ENABLED:true}
app.security.rate-limit.window-seconds=${RATE_LIMIT_WINDOW_SECONDS:60}
app.security.rate-limit.sensitive-requests-per-window=${RATE_LIMIT_SENSITIVE_REQUESTS_PER_WINDOW:30}
app.security.rate-limit.webhook-requests-per-window=${RATE_LIMIT_WEBHOOK_REQUESTS_PER_WINDOW:120}
app.security.rate-limit.profile-requests-per-window=${RATE_LIMIT_PROFILE_REQUESTS_PER_WINDOW:60}
app.security.rate-limit.max-keys=${RATE_LIMIT_MAX_KEYS:10000}
app.security.request.max-json-body-bytes=${REQUEST_MAX_JSON_BODY_BYTES:32768}
app.security.webhook.max-body-bytes=${WEBHOOK_MAX_BODY_BYTES:65536}
app.security.forwarded-headers.trusted-proxies=${TRUSTED_PROXY_CIDRS:}
app.security.oauth2.required-audience=ecommerce-api
app.security.oauth2.resource-client-id=ecommerce-api
app.security.oauth2.allowed-authorized-parties=ecommerce-web

app.environment=${APP_ENVIRONMENT:local}
app.deployment.containerized=${APP_CONTAINERIZED:false}
app.payment-provider.active=${PAYMENT_PROVIDER_ACTIVE:fake}
app.payment-provider.enabled=${PAYMENT_PROVIDER_ENABLED:fake}
app.payment.idempotency.in-progress-lease-seconds=${PAYMENT_IDEMPOTENCY_IN_PROGRESS_LEASE_SECONDS:300}
app.authentication-provider=${AUTHENTICATION_PROVIDER:keycloak}
app.fake-provider.webhook-secret=${FAKE_PROVIDER_WEBHOOK_SECRET:}
app.stripe.secret-key=${STRIPE_SECRET_KEY:}
app.stripe.webhook-secret=${STRIPE_WEBHOOK_SECRET:}
app.stripe.api-version=${STRIPE_API_VERSION:}
app.stripe.connect-timeout-ms=${STRIPE_CONNECT_TIMEOUT_MS:2000}
app.stripe.read-timeout-ms=${STRIPE_READ_TIMEOUT_MS:5000}
