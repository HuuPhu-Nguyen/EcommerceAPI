spring.application.name=E-Commerce API
spring.profiles.default=local
spring.jpa.open-in-view=false
spring.flyway.enabled=true
spring.mvc.problemdetails.enabled=true

app.environment=${APP_ENVIRONMENT:local}
app.payment-provider=${PAYMENT_PROVIDER:fake}
app.authentication-provider=${AUTHENTICATION_PROVIDER:keycloak}
app.stripe.secret-key=${STRIPE_SECRET_KEY:}
