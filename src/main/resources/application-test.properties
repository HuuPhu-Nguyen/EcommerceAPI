spring.datasource.url=${TEST_DB_URL:jdbc:tc:postgresql:16-alpine:///ecommerce_test}
spring.datasource.driver-class-name=${TEST_DB_DRIVER_CLASS_NAME:org.testcontainers.jdbc.ContainerDatabaseDriver}
spring.datasource.username=${TEST_DB_USERNAME:test}
spring.datasource.password=${TEST_DB_PASSWORD:test}

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false

app.environment=test
app.payment-provider.active=fake
app.payment-provider.enabled=fake
app.authentication-provider=test
app.fake-provider.webhook-secret=local-fake-webhook-secret
app.outbox.processing-enabled=false
app.reconciliation.scheduling-enabled=false
app.security.rate-limit.enabled=false
app.security.oauth2.required-audience=ecommerce-api
app.security.oauth2.resource-client-id=ecommerce-api
app.security.oauth2.allowed-authorized-parties=ecommerce-web

spring.security.oauth2.resourceserver.jwt.jwk-set-uri=http://localhost/unused-jwks
spring.security.oauth2.resourceserver.jwt.issuer-uri=http://localhost/realms/test
